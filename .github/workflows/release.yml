name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
# Uses PyPI Trusted Publishing -- no API tokens stored anywhere.
# Setup: https://docs.pypi.org/trusted-publishers/
#   1. Create the project on PyPI (a placeholder release once is fine).
#   2. PyPI -> Project -> Publishing -> Add a new publisher.
#   3. Owner: hacharya, Repo: geoimagery, Workflow: release.yml,
#      Environment: pypi.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hynek/build-and-inspect-python-package@v2
        id: baipp

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/geoimagery
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: Packages
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Attach artifacts to GitHub Release
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: Packages
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
